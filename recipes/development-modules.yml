modules:
  - type: dnf
    repos:
      files:
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
    install:
      packages:
        - code
        
  - type: dnf
    install:
      packages:
        - podman-compose
        - podman-tui
        - podlet
        - containers-common-extra

  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: system
        repo:
          title: Flathub (system)
        install:
          - io.podman_desktop.PodmanDesktop    # `systemctl --user enable --now podman.socket` && `ls -la /run/user/$(id -u)/podman/podman.sock`
          - me.iepure.devtoolbox
          - io.github.DenysMb.Kontainer
